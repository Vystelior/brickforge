<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legends of Chima — BrickForge</title>
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
</head>
<body class="chima-page">

  <!-- NAV -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav-logo">
      <span class="logo-brick">&#9632;</span>
      <span class="logo-text">BRICK<span class="logo-accent">VAULT</span></span>

    <div class="nav-links">

    </div>

      <span></span><span></span><span></span>
    </div>

  <!-- HERO -->
  <!-- HERO — Smash-style CHI split screen -->
  <section class="chima-intro" id="chimaIntro">

    <div class="ci-half ci-left">
      <img class="ci-bg-img" alt=""/>
      <div class="ci-atmo ci-atmo-left"></div>
      <div class="ci-chosen-glow"></div>
      <div class="ci-sparks" id="sparksLeft"></div>
      <div class="ci-hover-hint">Choose Laval</div>
      <div class="ci-name ci-name-left">
        <span class="ci-char">Laval</span>
        <span class="ci-sub">Prince of the Lion Tribe</span>
      </div>
    </div>
    <div class="ci-half ci-right">
      <img class="ci-bg-img" alt=""/>
      <div class="ci-atmo ci-atmo-right"></div>
      <div class="ci-chosen-glow"></div>
      <div class="ci-sparks" id="sparksRight"></div>
      <div class="ci-hover-hint">Choose Cragger</div>
      <div class="ci-name ci-name-right">
        <span class="ci-char">Cragger</span>
        <span class="ci-sub">King of the Crocodile Tribe</span>
      </div>
    </div>
    <div class="ci-divider">
      <div class="ci-div-line ci-div-line-top"></div>
      <div class="ci-orb-wrap">
        <div class="ci-orb-outer"></div>
        <div class="ci-orb-mid"></div>
        <div class="ci-orb-inner"></div>
        <svg class="ci-orb-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,4 30,12 30,28 20,36 10,28 10,12" fill="none" stroke="rgba(160,240,255,0.7)" stroke-width="1"/>
          <polygon points="20,8 27,14 27,26 20,32 13,26 13,14" fill="rgba(100,220,255,0.15)" stroke="rgba(200,245,255,0.5)" stroke-width="0.8"/>
          <line x1="20" y1="4"  x2="20" y2="36" stroke="rgba(180,240,255,0.4)" stroke-width="0.6"/>
          <line x1="10" y1="12" x2="30" y2="28" stroke="rgba(180,240,255,0.3)" stroke-width="0.6"/>
          <line x1="30" y1="12" x2="10" y2="28" stroke="rgba(180,240,255,0.3)" stroke-width="0.6"/>
          <circle cx="20" cy="20" r="4" fill="rgba(220,248,255,0.9)"/>
        </svg>
      </div>
      <div class="ci-div-line ci-div-line-bot"></div>
    </div>
    <div class="ci-prompt" id="ciPrompt">Press anywhere to begin</div>
    <div class="ci-flash" id="ciFlash"></div>
  </section>

  <!-- CONTENT -->
  <div class="content-area">
    <div class="section-header" style="text-align:left; margin-bottom:40px;">
      <p class="section-eyebrow">Select Episode</p>
      <h2 class="section-title">All Seasons</h2>
    </div>

    <div class="chapters-list" id="seasonsList"></div>
  </div>

  <!-- PLAYER MODAL -->
  <div class="player-modal" id="playerModal">
    <div class="player-inner">
      <div class="player-topbar">
        <span class="player-episode-name" id="playerTitle">Episode</span>
        <button class="player-close" id="playerClose" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="player-frame-wrap">
        <iframe id="playerFrame" allow="autoplay; fullscreen" allowfullscreen></iframe>
      </div>
      <p class="player-notice">If the video doesn't load, make sure the Google Drive file is shared publicly.</p>
    </div>
  </div>

  <script src="scripts/nav.js"></script>
  <script>
    // =============================================
    // LEGENDS OF CHIMA DATA
    // Add your seasons and episodes below.
    // Replace driveId values with your actual
    // Google Drive file IDs.
    // Format: https://drive.google.com/file/d/FILE_ID/view
    // =============================================
    const seasons = [
      {
        number: 1,
        title: "The Power of CHI",
        episodes: [
          { ep: 1, title: "A Tangled Web", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 2, title: "The Legend of Chima", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 3, title: "The Warrior Within", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 4, title: "The Joyride", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 5, title: "Market Day", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 6, title: "Attack on Eagle Spire", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 7, title: "The Hundred Year Moon", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 8, title: "The Fake Chi Fall", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 9, title: "Gorilla My Dreams", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 10, title: "The Void", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
        ]
      },
      {
        number: 2,
        title: "The Great Story",
        episodes: [
          { ep: 1, title: "Into the Outlands", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 2, title: "A Tangled Web", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 3, title: "The CHI Jackers", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 4, title: "Tribes of Chima", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 5, title: "Laval in Exile", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 6, title: "The Black Cloud", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 7, title: "Balancing Act", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 8, title: "The Crescent", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
        ]
      },
      {
        number: 3,
        title: "The Fire & Ice Tribes",
        episodes: [
          { ep: 1, title: "Fire Dreaming", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 2, title: "The Legend of the Fire Chi", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 3, title: "The Phoenix Has Landed", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 4, title: "A Spark of Hope", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 5, title: "Wings of Fire", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
          { ep: 6, title: "The Heart of Cavora", driveId: "YOUR_DRIVE_FILE_ID_HERE" },
        ]
      }
    ];

    // =============================================
    // BUILD UI
    // =============================================
    const list = document.getElementById('seasonsList');

    seasons.forEach((season, idx) => {
      const block = document.createElement('div');
      block.className = 'chapter-block' + (idx === 0 ? ' open' : '');
      block.innerHTML = `
        <div class="chapter-header">
          <div class="chapter-header-left">
            <div class="chapter-number-badge">${season.number}</div>
            <div class="chapter-info">
              <h3>Season ${season.number}: ${season.title}</h3>
              <p>${season.episodes.length} Episodes</p>
            </div>
          </div>
          <div class="chapter-chevron">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="chapter-episodes">
          ${season.episodes.map(ep => `
            <div class="episode-card" data-id="${ep.driveId}" data-title="S${season.number} E${ep.ep}: ${ep.title}">
              <div class="episode-play-btn">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
              <div class="episode-info">
                <div class="episode-label">Season ${season.number} · Episode ${ep.ep}</div>
                <div class="episode-title">${ep.title}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      list.appendChild(block);
    });

    // =============================================
    // ACCORDION
    // =============================================
    document.querySelectorAll('.chapter-header').forEach(header => {
      header.addEventListener('click', () => {
        const block = header.closest('.chapter-block');
        const isOpen = block.classList.contains('open');
        document.querySelectorAll('.chapter-block').forEach(b => b.classList.remove('open'));
        if (!isOpen) block.classList.add('open');
      });
    });

    // =============================================
    // PLAYER
    // =============================================
    const modal = document.getElementById('playerModal');
    const frame = document.getElementById('playerFrame');
    const titleEl = document.getElementById('playerTitle');
    const closeBtn = document.getElementById('playerClose');

    function openPlayer(driveId, title) {
      const embedUrl = `https://drive.google.com/file/d/${driveId}/preview`;
      frame.src = embedUrl;
      titleEl.textContent = title;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
      modal.classList.remove('open');
      frame.src = '';
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.episode-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        const title = card.dataset.title;
        if (id === 'YOUR_DRIVE_FILE_ID_HERE') {
          alert('Video not linked yet. Replace YOUR_DRIVE_FILE_ID_HERE in chima.html with your Google Drive file ID.');
          return;
        }
        openPlayer(id, title);
      });
    });

    closeBtn.addEventListener('click', closePlayer);
    modal.addEventListener('click', (e) => { if (e.target === modal) closePlayer(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePlayer(); });
  </script>

  <style>
    /* ═══════════════════════════════
       CHIMA INTRO — split screen
    ═══════════════════════════════ */
    .chima-intro {
      position: relative; width: 100%; height: 100vh; min-height: 480px;
      display: flex; overflow: hidden;
      animation: ciReveal 1.2s ease 0.2s both;
    }
    @keyframes ciReveal { from{opacity:0} to{opacity:1} }

    /* the two halves */
    .ci-half {
      position: relative; width: 50%; height: 100%;
      overflow: hidden; cursor: pointer;
      transition: width 0.7s cubic-bezier(0.77,0,0.18,1);
    }

    /* full-width image behind both halves */
    .ci-bg-img {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
      transition: filter 0.6s ease;
      filter: brightness(0.5) saturate(0.35);
      pointer-events: none;
    }
    /* right half: image shifted left by 50vw so right half of image shows */
    .ci-right .ci-bg-img { left: -100%; }

    /* hover: brighten that side */
    .ci-half:hover .ci-bg-img { filter: brightness(0.75) saturate(0.7); }

    /* chosen: full brightness + colour, unchosen: darken */
    .ci-chosen   .ci-bg-img { filter: brightness(1.05) saturate(1.2) !important; }
    .ci-unchosen .ci-bg-img { filter: brightness(0.22) saturate(0.2) grayscale(0.5) !important; }

    /* atmosphere */
    .ci-atmo {
      position: absolute; inset: 0; opacity: 0;
      transition: opacity 1.2s ease; pointer-events: none; z-index: 1;
    }
    .ci-atmo-left  { background: radial-gradient(ellipse 100% 80% at 85% 50%, rgba(255,200,0,0.3) 0%, transparent 65%); }
    .ci-atmo-right { background: radial-gradient(ellipse 100% 80% at 15% 50%, rgba(0,200,80,0.25) 0%, transparent 65%); }
    .ci-chosen .ci-atmo { opacity: 1; }

    /* edge glow on chosen side */
    .ci-chosen-glow {
      position: absolute; top: 0; bottom: 0; width: 60px;
      opacity: 0; pointer-events: none; z-index: 2;
      transition: opacity 0.8s ease;
    }
    .ci-left  .ci-chosen-glow { right: 0; background: linear-gradient(to left,  rgba(255,200,0,0.35), transparent); }
    .ci-right .ci-chosen-glow { left:  0; background: linear-gradient(to right, rgba(0,220,100,0.3), transparent); }
    .ci-chosen .ci-chosen-glow { opacity: 1; }

    /* sparks */
    .ci-sparks { position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity 0.5s; z-index: 3; }
    .ci-chosen .ci-sparks { opacity:1; }
    .ci-spark {
      position:absolute; bottom:8%; width:2px; border-radius:2px;
      animation:ciSparkUp 2s ease-out infinite; opacity:0;
    }
    @keyframes ciSparkUp { 0%{opacity:0;transform:translateY(0)} 15%{opacity:1} 100%{opacity:0;transform:translateY(-220px)} }

    /* name labels */
    .ci-name {
      position: absolute; bottom: 36px; z-index: 4;
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease 0.2s, transform 0.6s ease 0.2s;
      transform: translateY(10px);
    }
    .ci-name-left  { right: 24px; text-align: right; }
    .ci-name-right { left:  24px; text-align: left; }
    .ci-chosen   .ci-name { opacity: 1; transform: translateY(0); }
    .ci-unchosen .ci-name { opacity: 0; }

    .ci-char {
      display: block;
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(13px, 2vw, 26px);
      font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase;
    }
    .ci-name-left  .ci-char { color: #ffcc44; text-shadow: 0 0 20px rgba(255,180,0,0.7), 0 2px 10px rgba(0,0,0,0.95); }
    .ci-name-right .ci-char { color: #66ffaa; text-shadow: 0 0 20px rgba(0,200,80,0.7),  0 2px 10px rgba(0,0,0,0.95); }
    .ci-sub {
      display: block; margin-top: 5px;
      font-family: 'Cinzel', serif;
      font-size: clamp(8px, 0.9vw, 11px);
      letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* hover hint label — shows before any pick */
    .ci-hover-hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4; pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
      white-space: nowrap;
      font-family: 'Cinzel', serif;
      font-size: clamp(9px, 1vw, 12px);
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }
    .ci-half:hover .ci-hover-hint { opacity: 1; }
    .ci-chosen   .ci-hover-hint,
    .ci-unchosen .ci-hover-hint { opacity: 0 !important; }

    /* CHI divider */
    .ci-divider {
      position: absolute; left: 50%; top: 0;
      transform: translateX(-50%);
      width: 48px; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      z-index: 20; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .ci-picked .ci-divider { opacity: 0; }

    .ci-div-line {
      flex: 1; width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(100,220,255,0.55));
      box-shadow: 0 0 8px rgba(100,220,255,0.35);
    }
    .ci-div-line-bot { background: linear-gradient(to top, transparent, rgba(100,220,255,0.55)); }

    .ci-orb-wrap {
      position: relative; width: 48px; height: 48px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .ci-orb-outer {
      position: absolute; inset: -10px; border-radius: 50%;
      background: radial-gradient(circle, rgba(100,220,255,0.18) 0%, transparent 70%);
      animation: chiPulse 2s ease-in-out infinite;
    }
    .ci-orb-mid {
      position: absolute; inset: 4px; border-radius: 50%;
      background: radial-gradient(circle, rgba(180,240,255,0.3) 0%, rgba(0,160,220,0.2) 60%, transparent 100%);
      animation: chiPulse 2s ease-in-out infinite 0.35s;
    }
    .ci-orb-inner {
      position: absolute; inset: 10px; border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #80eeff 40%, #00aadd 100%);
      box-shadow: 0 0 16px 4px rgba(100,220,255,0.75), 0 0 32px 8px rgba(0,180,255,0.4);
      animation: chiOrbPulse 2s ease-in-out infinite;
    }
    .ci-orb-svg {
      position: absolute; width: 40px; height: 40px;
      animation: chiSpin 8s linear infinite;
    }
    @keyframes chiPulse    { 0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }
    @keyframes chiOrbPulse { 0%,100%{box-shadow:0 0 16px 4px rgba(100,220,255,0.75),0 0 32px 8px rgba(0,180,255,0.4)} 50%{box-shadow:0 0 26px 8px rgba(160,240,255,0.95),0 0 52px 16px rgba(0,200,255,0.55)} }
    @keyframes chiSpin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* flash */
    .ci-flash {
      position:absolute; inset:0; background:#fff; opacity:0;
      pointer-events:none; z-index:200; transition:opacity 0.06s;
    }
    .ci-flash.on { opacity:0.6; }

    /* collapse animation */
    .chima-intro.ci-collapsing {
      transition: height 0.7s cubic-bezier(0.77,0,0.18,1), opacity 0.4s ease 0.5s;
      height: 0 !important;
      opacity: 0;
      overflow: hidden;
    }

    /* ── THEME VARIABLES applied to body ── */
    body.theme-laval {
      --chima-accent:      #e8a800;
      --chima-accent-glow: rgba(255,180,0,0.45);
      --chima-bg-glow:     rgba(255,160,0,0.08);
    }
    body.theme-cragger {
      --chima-accent:      #00cc66;
      --chima-accent-glow: rgba(0,200,80,0.45);
      --chima-bg-glow:     rgba(0,180,60,0.08);
    }

    /* override chima page accent colours */
    body.theme-laval .section-eyebrow,
    body.theme-laval .chapter-number-badge { color: var(--chima-accent); }
    body.theme-laval .chapter-block.open .chapter-number-badge {
      background: linear-gradient(135deg, var(--chima-accent), #b87000);
      border-color: var(--chima-accent);
      box-shadow: 0 0 20px var(--chima-accent-glow);
      color: #fff;
    }
    body.theme-laval .episode-play-btn {
      background: linear-gradient(135deg, var(--chima-accent), #b87000);
      box-shadow: 0 0 16px var(--chima-accent-glow);
    }
    body.theme-laval .show-hero-bg,
    body.theme-laval .content-area {
      background: radial-gradient(ellipse 80% 40% at 50% 0%, var(--chima-bg-glow), transparent);
    }

    body.theme-cragger .section-eyebrow,
    body.theme-cragger .chapter-number-badge { color: var(--chima-accent); }
    body.theme-cragger .chapter-block.open .chapter-number-badge {
      background: linear-gradient(135deg, var(--chima-accent), #007a3a);
      border-color: var(--chima-accent);
      box-shadow: 0 0 20px var(--chima-accent-glow);
      color: #fff;
    }
    body.theme-cragger .episode-play-btn {
      background: linear-gradient(135deg, var(--chima-accent), #007a3a);
      box-shadow: 0 0 16px var(--chima-accent-glow);
    }
    body.theme-cragger .show-hero-bg,
    body.theme-cragger .content-area {
      background: radial-gradient(ellipse 80% 40% at 50% 0%, var(--chima-bg-glow), transparent);
    }

    /* nav active character name */
    .nav-active-char {
      font-family: 'Cinzel Decorative', serif;
      font-size: 11px; font-weight: 900;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    body.theme-laval  .nav-active-char { color: #ffcc44; border: 1px solid rgba(255,200,0,0.35); background: rgba(255,180,0,0.08); opacity: 1; }
    body.theme-cragger .nav-active-char { color: #66ffaa; border: 1px solid rgba(0,200,80,0.35);  background: rgba(0,180,60,0.08);  opacity: 1; }

    @media(max-width:600px) {
      .ci-name-left  { right: 12px; }
      .ci-name-right { left:  12px; }
    }
  </style>

      // inject base64 img into both halves
      document.querySelectorAll('.ci-bg-img').forEach(img => img.src = IMG);

      // sparks
      function makeSparks(id, color) {
        const c = document.getElementById(id);
        if (!c) return;
        for (let i = 0; i < 22; i++) {
          const s = document.createElement('div');
          s.className = 'ci-spark';
          s.style.cssText = 'left:'+(8+Math.random()*84)+'%;height:'+(14+Math.random()*44)+'px;background:'+color+';box-shadow:0 0 5px 1px '+color+';animation-delay:'+(Math.random()*3)+'s;animation-duration:'+(1.2+Math.random()*1.6)+'s;';
          c.appendChild(s);
        }
      }
      makeSparks('sparksLeft',  '#ffcc44');
      makeSparks('sparksRight', '#44ff99');

      // inject nav char badge
      const nav = document.querySelector('.nav-links');
      if (nav) {
        const badge = document.createElement('span');
        badge.className = 'nav-active-char';
        badge.id = 'navCharBadge';
        nav.appendChild(badge);
      }

      let picked = false;

      function pickSide(side) {
        if (picked) return;
        picked = true;

        const intro   = document.getElementById('chimaIntro');
        const flash   = document.getElementById('ciFlash');
        const leftH   = document.querySelector('.ci-left');
        const rightH  = document.querySelector('.ci-right');
        const badge   = document.getElementById('navCharBadge');

        // flash
        flash.classList.add('on');
        setTimeout(() => flash.classList.remove('on'), 100);

        // mark chosen / unchosen
        intro.classList.add('ci-picked');
        if (side === 'laval') {
          leftH.classList.add('ci-chosen');
          rightH.classList.add('ci-unchosen');
          document.body.classList.add('theme-laval');
          if (badge) badge.textContent = 'Laval';
        } else {
          rightH.classList.add('ci-chosen');
          leftH.classList.add('ci-unchosen');
          document.body.classList.add('theme-cragger');
          if (badge) badge.textContent = 'Cragger';
        }

        // collapse after showing the highlight
        setTimeout(() => {
          intro.style.height = intro.offsetHeight + 'px'; // lock height before transition
          requestAnimationFrame(() => {
            intro.classList.add('ci-collapsing');
          });
          // scroll to content after collapse
          setTimeout(() => {
            intro.style.display = 'none';
            const content = document.querySelector('.content-area');
            if (content) content.scrollIntoView({ behavior: 'smooth' });
          }, 1100);
        }, 900);
      }

      document.querySelector('.ci-left') .addEventListener('click', () => pickSide('laval'));
      document.querySelector('.ci-right').addEventListener('click', () => pickSide('cragger'));
    })();
  </script>
